services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Persist DB on the named volume
      DATABASE_URL: "file:/data/prod.db"
    volumes:
      - sqlite-data:/data
    restart: unless-stopped

volumes:
  sqlite-data:
